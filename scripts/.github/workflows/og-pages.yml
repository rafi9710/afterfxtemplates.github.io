name: Generate template share pages

on:
  push:
    branches: [main]
    paths: ['templates.json']   # runs only when you upload a new templates.json
  workflow_dispatch:            # lets you run it manually the first time

permissions:
  contents: write

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build /t pages
        run: node scripts/gen-og.js
      - name: Commit pages
        run: |
          git config user.name  "og-bot"
          git config user.email "og-bot@users.noreply.github.com"
          git add t
          git diff --cached --quiet || git commit -m "Auto: regenerate template share pages [skip ci]"
          git push
